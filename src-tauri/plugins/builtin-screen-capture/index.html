<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>截图录屏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 16px;
      background: rgba(56, 189, 248, 0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h2 { font-size: 18px; margin-bottom: 8px; }
    p { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 20px; }
    .hint {
      font-size: 11px;
      color: #666;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.06);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📸</div>
    <h2>截图录屏</h2>
    <p>区域截图 · 滚动长截图 · 屏幕录制<br>支持 PNG / JPEG / PDF / GIF / MP4</p>
    <div class="hint">
      此功能已集成到主界面，请在搜索框中输入「截图」或「录屏」即可快速访问。
    </div>
  </div>
</body>
</html>
